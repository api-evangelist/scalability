      - type: Getting Started
        url: https://prometheus.io/docs/introduction/first_steps/
    contact:
      - type: GitHub Issues
        url: https://github.com/prometheus/prometheus/issues

  - name: Grafana HTTP API
    description: >-
      Grafana is the open-source platform for monitoring and observability, providing
      a REST HTTP API for managing dashboards, data sources, users, and alerts.
      Widely used alongside Prometheus for scalability metrics visualization and
      alerting workflows.
    image: https://grafana.com/static/assets/img/fav32.png
