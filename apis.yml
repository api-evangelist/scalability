name: Scalability
description: >-
  A subject-matter collection covering APIs, tools, frameworks, and data sources
  related to application scalability, infrastructure scaling, performance optimization,
  and elastic resource management. This topic spans cloud provider auto-scaling,
  event-driven autoscaling (KEDA), load balancing, database scaling, and observability
  for scale.
