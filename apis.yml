      - type: Pricing
        url: https://azure.microsoft.com/en-us/pricing/
    contact:
      - type: Support
        url: https://azure.microsoft.com/en-us/support/

  - name: CloudWatch Application Signals API
    description: >-
      Amazon CloudWatch Application Signals provides application performance monitoring
      (APM) to help detect and diagnose performance issues and automatically correlate
      them with infrastructure metrics for scaling decisions. Part of the AWS
      observability suite used in scalability engineering.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanUrl: https://docs.aws.amazon.com/AmazonCloudWatch/latest/monitoring/CloudWatch-Application-Signals.html
    baseUrl: https://monitoring.amazonaws.com
    tags:
