      - type: Getting Started
        url: https://docs.aws.amazon.com/AmazonCloudWatch/latest/monitoring/GetStarted.html
    contact:
      - type: Support
        url: https://aws.amazon.com/contact-us/

  - name: Prometheus HTTP API
    description: >-
      Prometheus is the de-facto open-source monitoring and alerting toolkit for
      cloud-native applications and a CNCF graduate project. The Prometheus HTTP
      API provides access to time series data, metadata, and administrative functions
      used extensively in scalability engineering to track metrics and inform
      autoscaling decisions.
    image: https://prometheus.io/assets/prometheus_logo_grey.svg
    humanUrl: https://prometheus.io/
    baseUrl: https://prometheus.io/api/v1
    tags:
