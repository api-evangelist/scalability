apis:
  - name: KEDA (Kubernetes Event-Driven Autoscaling) API
    description: >-
      KEDA is a Kubernetes-based event-driven autoscaling component and CNCF graduate
      project. It provides fine-grained autoscaling (including to/from zero) for
      event-driven Kubernetes workloads by bridging over 70 built-in scalers to
      message brokers, cloud services, and databases. KEDA extends the Kubernetes
      Horizontal Pod Autoscaler (HPA) with custom resource definitions for
      ScaledObjects and ScaledJobs.
    image: https://keda.sh/img/logos/keda-icon-color.png
    humanUrl: https://keda.sh/
    baseUrl: https://api.keda.sh
    tags:
      - Auto Scaling
      - CNCF
      - Event-Driven
      - Kubernetes
      - Scale To Zero
    properties:
      - type: Documentation
        url: https://keda.sh/docs/
      - type: GitHub
        url: https://github.com/kedacore/keda
      - type: OpenAPI
        url: https://raw.githubusercontent.com/kedacore/keda/main/apis/keda/v1alpha1/
      - type: Changelog
        url: https://github.com/kedacore/keda/releases
      - type: Blog
        url: https://keda.sh/blog/
    contact:
      - type: GitHub Issues
        url: https://github.com/kedacore/keda/issues
      - type: Slack
        url: https://kubernetes.slack.com/archives/CKZJ36A5D

  - name: AWS Auto Scaling API
    description: >-
      Amazon Web Services Auto Scaling monitors applications and automatically
      adjusts capacity to maintain steady, predictable performance at the lowest
      possible cost. Supports EC2 Auto Scaling, Application Auto Scaling for
      ECS, DynamoDB, Lambda, and more. Part of the AWS SDK and REST API surface.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanUrl: https://aws.amazon.com/autoscaling/
    baseUrl: https://autoscaling.amazonaws.com
    tags:
      - Amazon Web Services
      - Auto Scaling
      - Cloud
      - EC2
      - Elasticity
    properties:
      - type: Documentation
        url: https://docs.aws.amazon.com/autoscaling/
      - type: OpenAPI
        url: https://raw.githubusercontent.com/APIs-guru/openapi-directory/main/APIs/amazonaws.com/autoscaling/2011-01-01/openapi.yaml
      - type: Pricing
        url: https://aws.amazon.com/autoscaling/pricing/
      - type: Getting Started
        url: https://docs.aws.amazon.com/autoscaling/ec2/userguide/get-started-with-ec2-auto-scaling.html
    contact:
      - type: Support
        url: https://aws.amazon.com/contact-us/

  - name: Google Cloud Compute Engine Autoscaler API
    description: >-
      Google Cloud's Autoscaler API enables automatic scaling of managed instance
      groups based on CPU utilization, load balancing capacity, or Cloud Monitoring
      metrics. Integrates with Google Kubernetes Engine (GKE) for cluster autoscaling
      and node auto-provisioning.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanUrl: https://cloud.google.com/compute/docs/autoscaler
    baseUrl: https://compute.googleapis.com/compute/v1
    tags:
      - Auto Scaling
      - Cloud
      - GKE
      - Google Cloud
      - Instance Groups
    properties:
      - type: Documentation
        url: https://cloud.google.com/compute/docs/autoscaler
      - type: OpenAPI
        url: https://raw.githubusercontent.com/APIs-guru/openapi-directory/main/APIs/googleapis.com/compute/v1/openapi.yaml
      - type: Pricing
        url: https://cloud.google.com/compute/pricing
      - type: SDK
        url: https://cloud.google.com/sdk/docs
    contact:
      - type: Support
        url: https://cloud.google.com/support

  - name: Azure Autoscale REST API
    description: >-
      Microsoft Azure Autoscale provides a REST API for managing autoscale settings
      on Azure resources including Virtual Machine Scale Sets, App Service, and
      Azure Container Apps. Supports schedule-based and metric-based scaling rules
      with notification capabilities.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanUrl: https://learn.microsoft.com/en-us/azure/azure-monitor/autoscale/autoscale-overview
    baseUrl: https://management.azure.com
    tags:
      - Auto Scaling
      - Azure
      - Cloud
      - Microsoft
      - Virtual Machine Scale Sets
    properties:
      - type: Documentation
        url: https://learn.microsoft.com/en-us/azure/azure-monitor/autoscale/autoscale-overview
      - type: OpenAPI
        url: https://raw.githubusercontent.com/Azure/azure-rest-api-specs/main/specification/monitor/resource-manager/Microsoft.Insights/stable/2022-10-01/autoScale_API.json
      - type: SDK
